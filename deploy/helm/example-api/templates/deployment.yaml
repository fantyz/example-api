apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "example-api.fullname" . }}
  labels:
    {{- include "example-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "example-api.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "example-api.selectorLabels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ include "example-api.serviceAccountName" . }}

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532

      containers:
        - name: example-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          env:
            - name: LOG_LEVEL
              value: {{ .Values.environment.logLevel | quote }}
            - name: LOG_JSON
              value: {{ .Values.environment.logJSON | quote }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}