name: deploy

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

env:
  AWS_REGION: eu-west-1
  EKS_CLUSTER_NAME: kpe-eks-cluster
  KUBERNETES_NAMESPACE: team-a
  ECR_REPOSITORY: 345044991850.dkr.ecr.eu-west-1.amazonaws.com/example-api
  AWS_PUBLISH_ROLE_ARN: arn:aws:iam::345044991850:role/github-example-api-publish
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::345044991850:role/github-example-api-deploy

jobs:
  publish:
    name: Publish image
    # Only deploy after a successful CI run caused by a push.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      # workflow_run has its own GitHub context, so explicitly check out
      # the commit tested by the triggering CI workflow.
      - name: Checkout tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Required because the current Dockerfile builds with -mod=vendor.
      - name: Vendor dependencies
        run: go mod vendor

      - name: Generate image tag
        id: image
        run: |
          echo "tag=${{ github.event.workflow_run.head_sha }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          IMAGE="${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build --tag "${IMAGE}" .
          docker push "${IMAGE}"

          echo "Published ${IMAGE}"

  deploy:
    name: Deploy to EKS
    needs:
      - publish

    runs-on: ubuntu-latest

    concurrency:
      group: example-api-team-a
      cancel-in-progress: true

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Kubernetes access
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
        run: |
          helm upgrade --install example-api \
            ./deploy/helm/example-api \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --set-string image.repository="${ECR_REPOSITORY}" \
            --set-string image.tag="${IMAGE_TAG}" \
            --atomic \
            --timeout 5m

      - name: Show release status
        run: |
          helm status example-api \
            --namespace "${KUBERNETES_NAMESPACE}"